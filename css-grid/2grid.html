<!DOCTYPE html>


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2*2 grid</title>
</head>
<style>
   
    .a{
        
        display: grid;
        grid-template-rows:100px 100px;
        grid-template-columns: 100px 100px;
        gap: 20px;
       
        
    
    
    }
    .b{
        display: grid;
        background-color: aquamarine;
        border: 2px solid black;
        justify-items: center;
        align-items:center;

    }
    
</style>
<body>
    <div class="a">
    <div class="b">1</div>
    <div class="b">2</div>
    <div class="b">3</div>
    <div class="b">4</div>
    
    </div>
</body>
</html>
