<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <center>

        <form action="login.html" method="get" target="_self">
        <h1>REGISTRATION FORM</h1>
        <br><br>
        <label for="name">Name</label>
        <input type="text" name="name" placeholder="Enter your name" required>
       <br><br>
        <label for="dob">DOB</label>
        <input type="date" name="dob" placeholder="Enter your DOB" required>
       <br><br>
        <label for="age">Age</label>
        <input type="number" name="age" placeholder="Enter your age" required>
         <br> <br>
      <label for="gender">Gender</label>
                <input type="radio" name="gender" value="male">
                <span>male</span>
        <input type="radio" name="gender" value="female">
        <span>Female</span> 
               <br><br>
               <label for="email">Email ID</label>
               <input type="email" name="email" placeholder="Enter your email" required>
        <br><br>
        <label for="password">Password</label>
        
        <input type="password" name="password" placeholder="Enter your password" required>
        <br><br>
        <label for="phn">Mobile number</label>
        <input type="tel" maxlength="10" name="phn" placeholder="Enter your mobile number" required>
        <br><br>
         <label for="hobbies">Hobbies : </label>
                <input type="checkbox" name="hobbies"value="reading">
            <span>Reading</span> 
         <br>
        <input type="checkbox" name="hobbies" value="singing">
        <span>Singing</span> 
         <br>
        <input type="checkbox" name="hobbies" value="travel">
        <span>Travelling</span> 
                   <br><br>
        <button type="submit">Register</button>
        <br><br>
        <button type="reset">Reset</button>

</form>

    </center>
    
</body>
</html>
